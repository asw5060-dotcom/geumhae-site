<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의 완료</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 100px 20px;
      background: #f7f7f7;
      margin: 0;
    }

    .box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      max-width: 520px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1f3a5f;
      margin-bottom: 16px;
    }

    p {
      margin: 12px 0;
      color: #444;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #1f3a5f;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }

    .btn:hover {
      background: #162c48;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>문의가 접수되었습니다</h1>
    <p>빠르게 확인 후 연락드리겠습니다.</p>
    <p>급하신 경우 아래 번호로 바로 연락 주세요.</p>
    <p><strong>📞 010-7466-3617</strong></p>

    <a href="index.html" class="btn">홈으로 돌아가기</a>
  </div>

</body>
</html>
